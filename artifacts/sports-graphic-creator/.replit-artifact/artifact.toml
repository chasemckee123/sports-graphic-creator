kind = "web"
previewPath = "/"
title = "Sports Graphic Creator"
version = "1.0.0"
id = "artifacts/sports-graphic-creator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26251
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/sports-graphic-creator run dev"

[services.env]
PORT = "26251"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/sports-graphic-creator", "run", "build"]
publicDir = "artifacts/sports-graphic-creator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
